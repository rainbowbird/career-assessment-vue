# 生产环境 Docker Compose 配置
# 用于云主机部署

services:
  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: career-assessment-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/ssl:/etc/nginx/ssl:ro
      - ./data/logs/nginx:/var/log/nginx
    depends_on:
      - web
      - api
    networks:
      - career-network

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: career-assessment-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: career_assessment
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apppassword}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/backups:/backups
    networks:
      - career-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # API 后端
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: career-assessment-api
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${DB_USER:-appuser}:${DB_PASSWORD:-apppassword}@mysql:3306/career_assessment
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - career-network
    depends_on:
      mysql:
        condition: service_healthy

  # Web 前端
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: career-assessment-web
    restart: always
    expose:
      - "80"
    networks:
      - career-network
    depends_on:
      - api

networks:
  career-network:
    driver: bridge

volumes:
  mysql_data:
