version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: career-assessment-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: career_assessment
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apppassword}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - career-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: career-assessment-api-prod
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${DB_USER:-appuser}:${DB_PASSWORD:-apppassword}@mysql:3306/career_assessment
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
    networks:
      - career-network
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: career-assessment-web-prod
    restart: always
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - career-network
    depends_on:
      - api

volumes:
  mysql_data:

networks:
  career-network:
    driver: bridge
