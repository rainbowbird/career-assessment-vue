version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: career-assessment-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: career_assessment
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - career-assessment-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - career-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: career-assessment-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://appuser:apppassword@mysql:3306/career_assessment
      - PORT=3000
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - career-network
    command: pnpm dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: career-assessment-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    networks:
      - career-network
    command: pnpm dev

networks:
  career-network:
    driver: bridge

volumes:
  career-assessment-mysql-data:
    driver: local
